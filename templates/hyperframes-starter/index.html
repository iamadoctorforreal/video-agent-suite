<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Agent Suite - Hyperframes Template</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    body { margin: 0; padding: 0; background: #000; }
    .composition { width: 1080px; height: 1920px; position: relative; overflow: hidden; background: #1a1a2e; }
  </style>
</head>
<body>
  <div id="root" class="composition">
    <div id="main-composition">
      <!-- Scene 1: Title -->
      <div class="clip" data-track="0" data-start="0s" data-duration="3s"
           style="position:absolute; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:40px;">
        <div class="title-text" style="font-size:72px; font-weight:bold; color:white; text-align:center; opacity:0;">
          Video Agent Suite
        </div>
        <div class="subtitle-text" style="font-size:36px; color:#a0a0a0; text-align:center; margin-top:20px; opacity:0;">
          AI-Powered Video Creation
        </div>
      </div>
    </div>
  </div>

  <script>
    // GSAP Timeline for Hyperframes
    const tl = gsap.timeline({ paused: true });
    window.__timelines = window.__timelines || {};
    window.__timelines['main'] = tl;

    // Animate title in
    tl.fromTo('.title-text', {
      scale: 0.8,
      opacity: 0,
    }, {
      scale: 1,
      opacity: 1,
      duration: 0.5,
      ease: 'power2.out',
    }, 0);

    // Animate subtitle in
    tl.fromTo('.subtitle-text', {
      y: 20,
      opacity: 0,
    }, {
      y: 0,
      opacity: 1,
      duration: 0.8,
      ease: 'power2.out',
    }, 0.5);
  </script>
</body>
</html>
