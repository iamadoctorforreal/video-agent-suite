<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Agent Suite - Interactive UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .pipeline-node { transition: all 0.3s ease; }
        .pipeline-node.active { animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7); }
            50% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-gray-900 text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Pipeline stages
        const PIPELINE_STAGES = [
            { id: 'scripting', name: 'Scripting', icon: '📝' },
            { id: 'director', name: 'Director', icon: '🎬' },
            { id: 'assets', name: 'Assets', icon: '️' },
            { id: 'voiceover', name: 'Voiceover', icon: '️' },
            { id: 'sound', name: 'Sound', icon: '' },
            { id: 'motion', name: 'Motion Graphics', icon: '✨' },
            { id: 'render', name: 'Dual Render', icon: '🎥' },
            { id: 'assembly', name: 'Assembly', icon: '🔧' },
            { id: 'qc', name: 'Quality Check', icon: '✅' },
            { id: 'thumbnails', name: 'Thumbnails', icon: '️' },
            { id: 'metadata', name: 'Metadata', icon: '📋' },
        ];

        function App() {
            const [projects, setProjects] = useState([]);
            const [selectedProject, setSelectedProject] = useState(null);
            const [isCreating, setIsCreating] = useState(false);
            const [topic, setTopic] = useState('');
            const [duration, setDuration] = useState(30);
            const [style, setStyle] = useState('marketing');

            // Fetch projects
            useEffect(() => {
                fetchProjects();
                const interval = setInterval(fetchProjects, 5000);
                return () => clearInterval(interval);
            }, []);

            const fetchProjects = async () => {
                try {
                    const res = await fetch('/api/projects');
                    const data = await res.json();
                    setProjects(data.projects || []);
                } catch (err) {
                    console.error('Failed to fetch projects:', err);
                }
            };

            const handleCreate = async () => {
                if (!topic) return;
                setIsCreating(true);
                try {
                    const res = await fetch('/api/create', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ topic, duration, style }),
                    });
                    const data = await res.json();
                    if (data.success) {
                        fetchProjects();
                        setTopic('');
                    }
                } catch (err) {
                    console.error('Failed to create video:', err);
                }
                setIsCreating(false);
            };

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-gray-800 border-b border-gray-700 px-6 py-4">
                        <div className="flex items-center justify-between">
                            <h1 className="text-2xl font-bold">🎬 Video Agent Suite</h1>
                            <div className="text-sm text-gray-400">AI-Powered Video Production</div>
                        </div>
                    </header>

                    <div className="flex">
                        {/* Sidebar - Projects */}
                        <aside className="w-80 bg-gray-800 border-r border-gray-700 p-4">
                            <h2 className="text-lg font-semibold mb-4">Projects</h2>
                            <div className="space-y-2">
                                {projects.map((proj) => (
                                    <div
                                        key={proj.name}
                                        onClick={() => setSelectedProject(proj)}
                                        className={`p-3 rounded cursor-pointer transition ${
                                            selectedProject?.name === proj.name
                                                ? 'bg-blue-600'
                                                : 'bg-gray-700 hover:bg-gray-600'
                                        }`}
                                    >
                                        <div className="font-medium">{proj.name}</div>
                                        <div className="text-sm text-gray-400 truncate">{proj.topic}</div>
                                    </div>
                                ))}
                                {projects.length === 0 && (
                                    <div className="text-gray-500 text-sm">No projects yet</div>
                                )}
                            </div>
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 p-6">
                            {/* Create Video Form */}
                            <div className="bg-gray-800 rounded-lg p-6 mb-6">
                                <h2 className="text-xl font-semibold mb-4">Create New Video</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="col-span-2">
                                        <label className="block text-sm font-medium mb-2">Topic / Prompt</label>
                                        <input
                                            type="text"
                                            value={topic}
                                            onChange={(e) => setTopic(e.target.value)}
                                            placeholder="e.g., 5 tips for productivity"
                                            className="w-full px-4 py-2 bg-gray-700 rounded border border-gray-600 focus:border-blue-500 focus:outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-2">Duration (seconds)</label>
                                        <input
                                            type="number"
                                            value={duration}
                                            onChange={(e) => setDuration(parseInt(e.target.value))}
                                            className="w-full px-4 py-2 bg-gray-700 rounded border border-gray-600"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium mb-2">Style</label>
                                        <select
                                            value={style}
                                            onChange={(e) => setStyle(e.target.value)}
                                            className="w-full px-4 py-2 bg-gray-700 rounded border border-gray-600"
                                        >
                                            <option value="marketing">Marketing</option>
                                            <option value="explainer">Explainer</option>
                                            <option value="social">Social Media</option>
                                            <option value="product-launch">Product Launch</option>
                                        </select>
                                    </div>
                                </div>
                                <button
                                    onClick={handleCreate}
                                    disabled={isCreating || !topic}
                                    className="mt-4 px-6 py-2 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 rounded font-medium transition"
                                >
                                    {isCreating ? 'Creating...' : 'Create Video'}
                                </button>
                            </div>

                            {/* Pipeline Visualization */}
                            {selectedProject && (
                                <div className="bg-gray-800 rounded-lg p-6">
                                    <h2 className="text-xl font-semibold mb-4">Pipeline: {selectedProject.name}</h2>
                                    <div className="grid grid-cols-4 gap-4">
                                        {PIPELINE_STAGES.map((stage, idx) => (
                                            <div
                                                key={stage.id}
                                                className="pipeline-node bg-gray-700 rounded-lg p-4 text-center"
                                            >
                                                <div className="text-3xl mb-2">{stage.icon}</div>
                                                <div className="text-sm font-medium">{stage.name}</div>
                                                <div className="text-xs text-gray-400 mt-1">Step {idx + 1}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* Empty State */}
                            {!selectedProject && (
                                <div className="bg-gray-800 rounded-lg p-12 text-center">
                                    <div className="text-6xl mb-4">🎬</div>
                                    <h3 className="text-xl font-semibold mb-2">Select a Project</h3>
                                    <p className="text-gray-400">Choose a project from the sidebar or create a new one</p>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
